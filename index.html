<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stickman Go-Kart</title>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111827;font-family:'Plus Jakarta Sans',sans-serif;color:#e5e7eb}
#app{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}
#lobby{display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px;max-width:420px;width:90%}
#lobby h1{font-family:'Azeret Mono',monospace;font-size:28px;font-weight:900;letter-spacing:-1px;text-transform:uppercase;color:#fff}
#lobby h1 span{color:#f59e0b}
.lobby-subtitle{font-size:14px;color:#6b7280;margin-top:-12px}
.btn{padding:12px 28px;border:none;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#f59e0b;color:#111827}.btn-primary:hover{background:#d97706}
.btn-secondary{background:rgba(255,255,255,.08);color:#e5e7eb;border:1px solid rgba(255,255,255,.12)}.btn-secondary:hover{background:rgba(255,255,255,.14)}
.btn-small{padding:8px 18px;font-size:13px}
.input{padding:12px 16px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(255,255,255,.06);color:#fff;font-family:'Azeret Mono',monospace;font-size:18px;text-align:center;letter-spacing:6px;text-transform:uppercase;width:180px}
.input::placeholder{letter-spacing:2px;font-size:13px;color:#555}
.input:focus{outline:none;border-color:#f59e0b}
.lobby-or{color:#555;font-size:13px}
.room-code-display{font-family:'Azeret Mono',monospace;font-size:42px;font-weight:900;color:#f59e0b;letter-spacing:8px}
.player-list{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.player-chip{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:14px;font-weight:600}
.player-dot{width:12px;height:12px;border-radius:50%}
.error-msg{color:#ef4444;font-size:13px;min-height:18px}
#waiting-msg{color:#6b7280;font-size:13px}
#game-container{display:none;width:100%;height:100%;position:relative}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:4px}
.hud-lap{font-family:'Azeret Mono',monospace;font-size:18px;font-weight:700;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.9)}
.hud-time{font-family:'Azeret Mono',monospace;font-size:14px;font-weight:600;color:#9ca3af;text-shadow:0 2px 6px rgba(0,0,0,.9)}
.hud-speed{font-family:'Azeret Mono',monospace;font-size:22px;font-weight:900;color:#6ee7b7;text-shadow:0 2px 6px rgba(0,0,0,.9)}
.hud-pos{font-family:'Azeret Mono',monospace;font-size:13px;font-weight:600;text-shadow:0 2px 6px rgba(0,0,0,.9)}
#countdown-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.5)}
#countdown-number{font-family:'Azeret Mono',monospace;font-size:120px;font-weight:900;color:#f59e0b;text-shadow:0 0 40px rgba(245,158,11,.4)}
#results-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.75);flex-direction:column;gap:20px}
#results-overlay h2{font-family:'Azeret Mono',monospace;font-size:32px;font-weight:900;color:#fff}
.results-list{display:flex;flex-direction:column;gap:10px}
.result-row{display:flex;align-items:center;gap:12px;font-family:'Azeret Mono',monospace;font-size:16px;font-weight:600}
.result-pos{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#111827}
#touch-controls{position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:15;display:none;padding:20px;justify-content:space-between;align-items:flex-end}
.touch-btn{pointer-events:auto;width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.touch-btn:active,.touch-btn.pressed{background:rgba(255,255,255,.3)}
.touch-group{display:flex;gap:10px}
.touch-pedals{display:flex;flex-direction:column;gap:10px}
.controls-hint{font-size:11px;color:#4b5563;text-align:center;margin-top:4px}
#connecting-msg{color:#f59e0b;font-size:13px;min-height:18px}
/* Speed bar */
#speed-bar-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:200px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;z-index:10;pointer-events:none}
#speed-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#6ee7b7,#f59e0b,#ef4444);width:0%;transition:width .1s}
/* Steering wheel indicator */
#steering-indicator{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:10}
</style>
</head>
<body>
<div id="app">

<div id="lobby">
  <h1>Stickman <span>Go-Kart</span></h1>
  <p class="lobby-subtitle">up to 4 players — online multiplayer</p>
  <div id="lobby-menu" style="display:flex;flex-direction:column;align-items:center;gap:14px">
    <div id="connecting-msg">Connecting to server...</div>
    <button class="btn btn-primary" id="btn-create" disabled>Create Room</button>
    <span class="lobby-or">or join with code</span>
    <div style="display:flex;gap:8px;align-items:center">
      <input class="input" id="join-code" placeholder="CODE" maxlength="4">
      <button class="btn btn-secondary btn-small" id="btn-join" disabled>Join</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <p class="controls-hint">WASD or Arrow Keys to drive</p>
  </div>
  <div id="lobby-room" style="display:none;flex-direction:column;align-items:center;gap:16px">
    <p style="font-size:13px;color:#6b7280">Share this code with your opponents:</p>
    <div class="room-code-display" id="room-code-display"></div>
    <div class="player-list" id="player-list"></div>
    <p id="waiting-msg">Waiting for players...</p>
    <button class="btn btn-primary" id="start-btn" style="display:none">Start Race</button>
  </div>
</div>

<div id="game-container">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="hud-left">
      <div class="hud-lap" id="hud-lap">LAP 1/3</div>
      <div class="hud-time" id="hud-time">0.0s</div>
    </div>
    <div class="hud-right" id="hud-positions"></div>
  </div>
  <div style="position:fixed;bottom:40px;left:16px;pointer-events:none;z-index:10">
    <div class="hud-speed" id="hud-speed">0 km/h</div>
  </div>
  <div id="speed-bar-container"><div id="speed-bar"></div></div>
  <div id="countdown-overlay"><div id="countdown-number"></div></div>
  <div id="results-overlay">
    <h2>RACE OVER</h2>
    <div class="results-list" id="results-list"></div>
    <button class="btn btn-primary" id="btn-restart">Race Again</button>
  </div>
  <div id="touch-controls">
    <div class="touch-group">
      <button class="touch-btn" data-key="left">&#x25C0;</button>
      <button class="touch-btn" data-key="right">&#x25B6;</button>
    </div>
    <div class="touch-pedals">
      <button class="touch-btn" data-key="up">&#x25B2;</button>
      <button class="touch-btn" data-key="down">&#x25BC;</button>
    </div>
  </div>
</div>

</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
const SERVER_URL = "https://gokart-server-production.up.railway.app";

let socket = null;
let myIndex = -1, myColor = "", myName = "", roomCode = "", isHost = false;
let gameState = null, raceActive = false;

// Track constants (must match server)
const TRACK_CX = 800, TRACK_CY = 450;
const OUTER_RX = 650, OUTER_RY = 350;
const INNER_RX = 400, INNER_RY = 170;
const MID_RX = (OUTER_RX + INNER_RX) / 2;
const MID_RY = (OUTER_RY + INNER_RY) / 2;
const TRACK_HALF_W = (OUTER_RX - INNER_RX) / 2; // half-width of road

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ── Connect ──
socket = io(SERVER_URL);
socket.on("connect", () => {
  document.getElementById("connecting-msg").textContent = "";
  document.getElementById("btn-create").disabled = false;
  document.getElementById("btn-join").disabled = false;
});
socket.on("connect_error", () => {
  document.getElementById("connecting-msg").textContent = "Connecting to server...";
  document.getElementById("btn-create").disabled = true;
  document.getElementById("btn-join").disabled = true;
});

// ── UI ──
document.getElementById("btn-create").addEventListener("click", doCreate);
document.getElementById("btn-join").addEventListener("click", doJoin);
document.getElementById("start-btn").addEventListener("click", () => socket.emit("start_race"));
document.getElementById("btn-restart").addEventListener("click", () => socket.emit("restart_race"));
document.getElementById("join-code").addEventListener("keydown", (e) => { if (e.key === "Enter") doJoin(); });

document.querySelectorAll(".touch-btn").forEach(btn => {
  const key = btn.dataset.key;
  btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; btn.classList.add("pressed"); socket.emit("input", keys); });
  btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; btn.classList.remove("pressed"); socket.emit("input", keys); });
  btn.addEventListener("touchcancel", () => { keys[key] = false; btn.classList.remove("pressed"); socket.emit("input", keys); });
});

function doCreate() {
  socket.emit("create_room", (res) => {
    if (res.error) { document.getElementById("error-msg").textContent = res.error; return; }
    roomCode = res.code; myIndex = res.playerIndex; myColor = res.color; myName = res.name; isHost = true;
    showRoom();
  });
}
function doJoin() {
  const code = document.getElementById("join-code").value;
  socket.emit("join_room", code, (res) => {
    if (res.error) { document.getElementById("error-msg").textContent = res.error; return; }
    roomCode = res.code; myIndex = res.playerIndex; myColor = res.color; myName = res.name; isHost = false;
    showRoom();
  });
}
function showRoom() {
  document.getElementById("lobby-menu").style.display = "none";
  document.getElementById("lobby-room").style.display = "flex";
  document.getElementById("room-code-display").textContent = roomCode;
  if (isHost) document.getElementById("start-btn").style.display = "block";
}

// ── Socket events ──
socket.on("lobby_update", (data) => {
  const list = document.getElementById("player-list");
  list.innerHTML = "";
  data.players.forEach(p => {
    const chip = document.createElement("div");
    chip.className = "player-chip";
    chip.innerHTML = `<div class="player-dot" style="background:${p.color}"></div>${p.name}`;
    list.appendChild(chip);
  });
  document.getElementById("waiting-msg").textContent = data.players.length < 2 ? "Waiting for players..." : `${data.players.length} players ready`;
});

socket.on("countdown_start", () => {
  document.getElementById("lobby").style.display = "none";
  document.getElementById("game-container").style.display = "block";
  document.getElementById("countdown-overlay").style.display = "flex";
  document.getElementById("results-overlay").style.display = "none";
  raceActive = false;
  resizeCanvas();
  requestAnimationFrame(renderLoop);
  if ("ontouchstart" in window) document.getElementById("touch-controls").style.display = "flex";
});

socket.on("state", (data) => {
  gameState = data;
  if (data.countdown > 0) document.getElementById("countdown-number").textContent = data.countdown;
});

socket.on("race_start", () => {
  document.getElementById("countdown-overlay").style.display = "none";
  raceActive = true;
});

socket.on("race_over", (order) => {
  raceActive = false;
  document.getElementById("results-overlay").style.display = "flex";
  const list = document.getElementById("results-list");
  list.innerHTML = "";
  order.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "result-row";
    row.innerHTML = `<div class="result-pos" style="background:${p.color}">${i + 1}</div><span>${p.name}</span><span style="color:#6b7280">${p.time.toFixed(1)}s</span>`;
    list.appendChild(row);
  });
});

socket.on("back_to_lobby", () => {
  document.getElementById("results-overlay").style.display = "none";
  document.getElementById("game-container").style.display = "none";
  document.getElementById("lobby").style.display = "flex";
  document.getElementById("lobby-room").style.display = "flex";
  gameState = null; raceActive = false;
});

// ── Input ──
const keys = { up: false, down: false, left: false, right: false };
document.addEventListener("keydown", (e) => {
  let changed = false;
  if (e.code === "ArrowUp" || e.code === "KeyW") { keys.up = true; changed = true; }
  if (e.code === "ArrowDown" || e.code === "KeyS") { keys.down = true; changed = true; }
  if (e.code === "ArrowLeft" || e.code === "KeyA") { keys.left = true; changed = true; }
  if (e.code === "ArrowRight" || e.code === "KeyD") { keys.right = true; changed = true; }
  if (changed) { e.preventDefault(); socket.emit("input", keys); }
});
document.addEventListener("keyup", (e) => {
  let changed = false;
  if (e.code === "ArrowUp" || e.code === "KeyW") { keys.up = false; changed = true; }
  if (e.code === "ArrowDown" || e.code === "KeyS") { keys.down = false; changed = true; }
  if (e.code === "ArrowLeft" || e.code === "KeyA") { keys.left = false; changed = true; }
  if (e.code === "ArrowRight" || e.code === "KeyD") { keys.right = false; changed = true; }
  if (changed) socket.emit("input", keys);
});

// ── Canvas ──
function resizeCanvas() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
window.addEventListener("resize", resizeCanvas);
function renderLoop() { render(); requestAnimationFrame(renderLoop); }

// ══════════════════════════════════════
// PSEUDO-3D FIRST PERSON RENDERER
// ══════════════════════════════════════

// The track is an elliptical oval. We compute the player's position along the track
// as an angle, then project the road ahead using perspective projection.

function getTrackPos(x, y) {
  // Returns angle on the elliptical track and lateral offset from center
  const angle = Math.atan2(y - TRACK_CY, x - TRACK_CX);
  // Center of track at this angle
  const cx = TRACK_CX + Math.cos(angle) * MID_RX;
  const cy = TRACK_CY + Math.sin(angle) * MID_RY;
  // Distance from center line
  const dx = x - cx;
  const dy = y - cy;
  const lateralDist = Math.sqrt(dx * dx + dy * dy);
  // Which side? Use cross product with track tangent
  const tangentX = -Math.sin(angle) * MID_RX;
  const tangentY = Math.cos(angle) * MID_RY;
  const cross = dx * tangentY - dy * tangentX;
  const side = cross > 0 ? 1 : -1;
  return { angle, lateral: side * lateralDist };
}

function getTrackCenterAt(angle) {
  return {
    x: TRACK_CX + Math.cos(angle) * MID_RX,
    y: TRACK_CY + Math.sin(angle) * MID_RY
  };
}

function getTrackCurvatureAt(angle) {
  // Curvature of ellipse: κ = ab / (a²sin²t + b²cos²t)^(3/2)
  const a = MID_RX, b = MID_RY;
  const s = Math.sin(angle), c = Math.cos(angle);
  const denom = Math.pow(a * a * s * s + b * b * c * c, 1.5);
  return (a * b) / denom;
}

function render() {
  if (!gameState || !gameState.players) return;
  const cw = canvas.width, ch = canvas.height;
  const me = gameState.players.find(p => p.id === socket.id);
  if (!me) return;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, ch * 0.5);
  skyGrad.addColorStop(0, "#0f172a");
  skyGrad.addColorStop(0.6, "#1e3a5f");
  skyGrad.addColorStop(1, "#4a8bb5");
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, cw, ch * 0.5);

  // Ground
  ctx.fillStyle = "#1a3a0e";
  ctx.fillRect(0, ch * 0.5, cw, ch * 0.5);

  // Player track position
  const myTrack = getTrackPos(me.x, me.y);
  const myAngle = myTrack.angle;
  const myLateral = myTrack.lateral;

  // Road parameters
  const ROAD_W = TRACK_HALF_W * 2.8; // full road width in world units (wider for better feel)
  const DRAW_DIST = 140; // how many segments ahead to draw
  const SEG_LENGTH = 0.005; // angle increment per segment (radians)
  const horizon = ch * 0.45;

  // Direction: track goes counter-clockwise (angle decreases)
  // We step backwards in angle to look "ahead"
  const direction = -1; // CCW travel

  // Build road segments
  const segments = [];
  for (let i = 0; i < DRAW_DIST; i++) {
    const segAngle = myAngle + direction * i * SEG_LENGTH;
    const center = getTrackCenterAt(segAngle);
    // Curvature determines visual curve
    const curvature = getTrackCurvatureAt(segAngle);
    segments.push({ angle: segAngle, cx: center.x, cy: center.y, curvature, dist: i });
  }

  // Project segments to screen
  const camHeight = 50;
  const camDist = 10;
  const fov = 1.4;

  // Accumulate curve offset for pseudo-3D effect
  let curveOffset = 0;
  const projected = [];

  for (let i = 0; i < segments.length; i++) {
    const seg = segments[i];
    const z = (i + 1) * 5; // depth

    // Perspective scale
    const scale = fov * ch / z;
    const screenY = horizon + (camHeight * scale);

    if (screenY < horizon - 10 || screenY > ch + 50) continue;

    // Road width at this depth
    const roadScreenW = ROAD_W * scale;

    // Lateral offset: player's offset from center shifts the road
    const lateralShift = -myLateral * scale * 0.6;

    // Curve accumulation
    const angleDiff = seg.angle - myAngle;
    // Track tangent direction change = curvature
    const tangentAngle = Math.atan2(-Math.sin(seg.angle) * MID_RY, -Math.cos(seg.angle) * MID_RX);
    const myTangent = Math.atan2(-Math.sin(myAngle) * MID_RY, -Math.cos(myAngle) * MID_RX);
    let dAngle = tangentAngle - myTangent;
    while (dAngle > Math.PI) dAngle -= 2 * Math.PI;
    while (dAngle < -Math.PI) dAngle += 2 * Math.PI;
    curveOffset = dAngle * ch * 1.0;

    const screenX = cw / 2 + lateralShift + curveOffset;

    projected.push({
      screenX, screenY, roadScreenW, scale, z, dist: i,
      segAngle: seg.angle
    });
  }

  // Draw road from far to near
  for (let i = projected.length - 1; i >= 1; i--) {
    const far = projected[i];
    const near = projected[i - 1];

    // Alternating road color (for speed illusion)
    const stripe = Math.floor(far.dist / 3) % 2 === 0;

    // Road surface
    ctx.fillStyle = stripe ? "#374151" : "#2d3748";
    ctx.beginPath();
    ctx.moveTo(near.screenX - near.roadScreenW / 2, near.screenY);
    ctx.lineTo(near.screenX + near.roadScreenW / 2, near.screenY);
    ctx.lineTo(far.screenX + far.roadScreenW / 2, far.screenY);
    ctx.lineTo(far.screenX - far.roadScreenW / 2, far.screenY);
    ctx.closePath();
    ctx.fill();

    // Red/white curbs
    const curbW = near.roadScreenW * 0.06;
    const curbColor = stripe ? "#ef4444" : "#ffffff";
    // Left curb
    ctx.fillStyle = curbColor;
    ctx.beginPath();
    ctx.moveTo(near.screenX - near.roadScreenW / 2 - curbW, near.screenY);
    ctx.lineTo(near.screenX - near.roadScreenW / 2, near.screenY);
    ctx.lineTo(far.screenX - far.roadScreenW / 2, far.screenY);
    ctx.lineTo(far.screenX - far.roadScreenW / 2 - curbW * (far.scale / near.scale), far.screenY);
    ctx.closePath();
    ctx.fill();
    // Right curb
    ctx.beginPath();
    ctx.moveTo(near.screenX + near.roadScreenW / 2, near.screenY);
    ctx.lineTo(near.screenX + near.roadScreenW / 2 + curbW, near.screenY);
    ctx.lineTo(far.screenX + far.roadScreenW / 2 + curbW * (far.scale / near.scale), far.screenY);
    ctx.lineTo(far.screenX + far.roadScreenW / 2, far.screenY);
    ctx.closePath();
    ctx.fill();

    // Center dashed line
    if (stripe) {
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      const dashW = near.roadScreenW * 0.008;
      ctx.beginPath();
      ctx.moveTo(near.screenX - dashW, near.screenY);
      ctx.lineTo(near.screenX + dashW, near.screenY);
      ctx.lineTo(far.screenX + dashW * (far.scale / near.scale), far.screenY);
      ctx.lineTo(far.screenX - dashW * (far.scale / near.scale), far.screenY);
      ctx.closePath();
      ctx.fill();
    }

    // Grass detail stripes
    if (stripe) {
      ctx.fillStyle = "#16331a";
      // Left grass
      ctx.fillRect(0, far.screenY, far.screenX - far.roadScreenW / 2 - curbW * 2, near.screenY - far.screenY + 1);
      // Right grass
      ctx.fillRect(far.screenX + far.roadScreenW / 2 + curbW * 2, far.screenY, cw, near.screenY - far.screenY + 1);
    }
  }

  // ── Draw other karts ──
  const others = gameState.players.filter(p => p.id !== socket.id);
  const kartDrawList = [];

  for (const other of others) {
    const otherTrack = getTrackPos(other.x, other.y);
    // Angle difference (how far ahead/behind)
    let angleDiff = (otherTrack.angle - myAngle) * direction;
    while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
    while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;

    // Only show karts ahead (positive angleDiff = ahead for CCW travel)
    if (angleDiff < -0.02 || angleDiff > SEG_LENGTH * DRAW_DIST) continue;

    const segIdx = angleDiff / SEG_LENGTH;
    if (segIdx < 0 || segIdx >= projected.length - 1) continue;

    const lo = Math.floor(segIdx);
    const hi = Math.min(lo + 1, projected.length - 1);
    const t = segIdx - lo;

    if (lo >= projected.length || hi >= projected.length) continue;

    const projLo = projected[lo];
    const projHi = projected[hi];
    if (!projLo || !projHi) continue;

    const screenX = projLo.screenX + (projHi.screenX - projLo.screenX) * t;
    const screenY = projLo.screenY + (projHi.screenY - projLo.screenY) * t;
    const scale = projLo.scale + (projHi.scale - projLo.scale) * t;
    const roadW = projLo.roadScreenW + (projHi.roadScreenW - projLo.roadScreenW) * t;

    // Lateral position on road
    const lateralOffset = (otherTrack.lateral - myLateral) * scale;

    kartDrawList.push({
      x: screenX + lateralOffset,
      y: screenY,
      scale,
      color: other.color,
      name: other.name,
      z: projLo.z + (projHi.z - projLo.z) * t
    });
  }

  // Sort by z (far first)
  kartDrawList.sort((a, b) => b.z - a.z);

  for (const k of kartDrawList) {
    drawKartSprite(k.x, k.y, k.scale, k.color, k.name);
  }

  // ── Draw player's own kart (at bottom of screen) ──
  drawPlayerKart(cw, ch, me.color, me.speed);

  // ── Start/finish banner ──
  // Check if start/finish line is visible ahead
  let sfAngleDiff = (Math.PI - myAngle) * direction;
  while (sfAngleDiff > Math.PI) sfAngleDiff -= 2 * Math.PI;
  while (sfAngleDiff < -Math.PI) sfAngleDiff += 2 * Math.PI;
  if (sfAngleDiff > 0 && sfAngleDiff < SEG_LENGTH * DRAW_DIST * 0.8) {
    const sfIdx = sfAngleDiff / SEG_LENGTH;
    if (sfIdx >= 0 && sfIdx < projected.length - 1) {
      const lo = Math.floor(sfIdx);
      const hi = Math.min(lo + 1, projected.length - 1);
      if (projected[lo] && projected[hi]) {
        const t = sfIdx - lo;
        const sx = projected[lo].screenX + (projected[hi].screenX - projected[lo].screenX) * t;
        const sy = projected[lo].screenY + (projected[hi].screenY - projected[lo].screenY) * t;
        const sc = projected[lo].scale + (projected[hi].scale - projected[lo].scale) * t;
        const rw = projected[lo].roadScreenW + (projected[hi].roadScreenW - projected[lo].roadScreenW) * t;

        // Checkerboard banner
        const bannerH = sc * 30;
        const bannerW = rw * 1.1;
        const cols = 8, rows = 2;
        const cellW = bannerW / cols, cellH = bannerH / rows;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            ctx.fillStyle = (r + c) % 2 === 0 ? "#fff" : "#111";
            ctx.fillRect(sx - bannerW / 2 + c * cellW, sy - bannerH - r * cellH, cellW, cellH);
          }
        }
      }
    }
  }

  // ── HUD ──
  document.getElementById("hud-lap").textContent = `LAP ${Math.min(me.lap + 1, 3)}/3`;
  document.getElementById("hud-time").textContent = `${(me.raceTime || 0).toFixed(1)}s`;
  const speedVal = Math.abs(Math.round(me.speed));
  document.getElementById("hud-speed").textContent = `${speedVal} km/h`;
  document.getElementById("speed-bar").style.width = `${Math.min(100, speedVal / 3.2)}%`;

  // Positions
  const sorted = [...gameState.players].sort((a, b) => {
    if (a.finished && !b.finished) return -1;
    if (!a.finished && b.finished) return 1;
    if (a.finished && b.finished) return a.finishTime - b.finishTime;
    if (b.lap !== a.lap) return b.lap - a.lap;
    return b.checkpoint - a.checkpoint;
  });
  const posDiv = document.getElementById("hud-positions");
  posDiv.innerHTML = "";
  sorted.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "hud-pos";
    div.style.color = p.color;
    div.textContent = `${i + 1}. ${p.name}${p.finished ? " \u2713" : ""}`;
    posDiv.appendChild(div);
  });
}

function drawKartSprite(x, y, scale, color, name) {
  const size = scale * 12;
  if (size < 2) return;

  ctx.save();
  ctx.translate(x, y);

  // Kart body
  const kw = size * 2.5, kh = size * 1.8;
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fillRect(-kw / 2 + 2, -kh + 2, kw, kh);
  ctx.fillStyle = color;
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = Math.max(1, size * 0.15);
  ctx.beginPath();
  ctx.roundRect(-kw / 2, -kh, kw, kh, size * 0.3);
  ctx.fill();
  ctx.stroke();

  // Wheels
  ctx.fillStyle = "#111";
  const ww = kw * 0.25, wh = kh * 0.2;
  ctx.fillRect(-kw / 2 - ww * 0.3, -kh * 0.2, ww, wh);
  ctx.fillRect(kw / 2 - ww * 0.7, -kh * 0.2, ww, wh);

  // Stickman head
  ctx.fillStyle = "#fcd34d";
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = Math.max(0.5, size * 0.1);
  ctx.beginPath();
  ctx.arc(0, -kh - size * 0.5, size * 0.45, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Helmet
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(0, -kh - size * 0.5, size * 0.45, -Math.PI, 0);
  ctx.fill();

  // Name
  if (size > 5) {
    ctx.font = `600 ${Math.max(9, size * 0.7)}px 'Plus Jakarta Sans', sans-serif`;
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.shadowColor = "rgba(0,0,0,0.9)";
    ctx.shadowBlur = 3;
    ctx.fillText(name, 0, -kh - size * 1.2);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawPlayerKart(cw, ch, color, speed) {
  const kartW = cw * 0.18;
  const kartH = kartW * 0.5;
  const cx = cw / 2;
  const cy = ch - kartH * 0.3;

  ctx.save();
  ctx.translate(cx, cy);

  // Kart body (seen from behind, wider)
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.roundRect(-kartW / 2 + 3, -kartH + 3, kartW, kartH, 6);
  ctx.fill();

  ctx.fillStyle = color;
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(-kartW / 2, -kartH, kartW, kartH, 6);
  ctx.fill();
  ctx.stroke();

  // Rear axle
  ctx.fillStyle = "#222";
  ctx.fillRect(-kartW / 2 - 8, -kartH * 0.3, kartW + 16, kartH * 0.18);

  // Wheels (rear, visible from behind)
  const wheelW = kartW * 0.15, wheelH = kartH * 0.5;
  ctx.fillStyle = "#111";
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(-kartW / 2 - wheelW, -kartH * 0.6, wheelW, wheelH, 3); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(kartW / 2, -kartH * 0.6, wheelW, wheelH, 3); ctx.fill(); ctx.stroke();

  // Stickman (back view)
  // Body
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, -kartH * 0.5);
  ctx.lineTo(0, -kartH * 1.3);
  ctx.stroke();

  // Arms (reaching forward to steering wheel)
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, -kartH * 0.9);
  ctx.lineTo(-kartW * 0.25, -kartH * 0.7);
  ctx.moveTo(0, -kartH * 0.9);
  ctx.lineTo(kartW * 0.25, -kartH * 0.7);
  ctx.stroke();

  // Head with helmet
  const headR = kartW * 0.09;
  ctx.fillStyle = color;
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -kartH * 1.3 - headR, headR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Number on back
  ctx.fillStyle = "#fff";
  ctx.font = `700 ${kartH * 0.25}px 'Azeret Mono', monospace`;
  ctx.textAlign = "center";
  ctx.fillText(myName || "You", 0, -kartH * 0.75);

  // Exhaust particles when moving
  if (Math.abs(speed) > 50) {
    ctx.fillStyle = "rgba(150,150,150,0.4)";
    for (let i = 0; i < 4; i++) {
      const px = (Math.random() - 0.5) * kartW * 0.3;
      const py = Math.random() * 15;
      const pr = 2 + Math.random() * 4;
      ctx.beginPath();
      ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}
</script>
